{# Right-anchored slide-out panel. Included inside an Alpine x-data scope
   that exposes `open`, `url`, `openEmail(u)`, `close()`. #}

<div x-show="open"
     style="display: none;"
     class="fixed inset-0 z-40"
     @keydown.escape.window="close()">
    <div class="absolute inset-0 bg-black/50"
         x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="close()"></div>
    <aside class="absolute right-0 top-0 h-full w-full sm:w-[min(640px,90vw)] bg-base-100 shadow-2xl border-l border-base-300 flex flex-col"
           x-show="open"
           x-transition:enter="transition transform ease-out duration-200"
           x-transition:enter-start="translate-x-full"
           x-transition:enter-end="translate-x-0"
           x-transition:leave="transition transform ease-in duration-150"
           x-transition:leave-start="translate-x-0"
           x-transition:leave-end="translate-x-full">
        <div class="flex items-center justify-between gap-2 px-4 py-3 border-b border-base-300">
            <div class="text-sm font-semibold">Email</div>
            <button type="button" class="btn btn-sm btn-ghost" @click="close()">Close</button>
        </div>
        <div id="panel-content" class="flex-1 overflow-y-auto p-4">
            <div class="label-dim text-sm">Loading…</div>
        </div>
    </aside>
</div>
